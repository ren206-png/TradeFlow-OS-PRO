<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TradeFlow Pro{% endblock %} — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:bg-gray-800 hover:text-white transition-colors; }
    .sidebar-link.active { @apply bg-indigo-600 text-white; }
  </style>
</head>
<body class="h-full flex">

  <!-- Sidebar -->
  <aside class="w-64 flex-shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">
    <!-- Logo -->
    <div class="px-6 py-5 border-b border-gray-800">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div>
          <p class="text-white font-semibold text-sm leading-tight">TradeFlow Pro</p>
          <p class="text-gray-500 text-xs">Admin Dashboard</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/dashboard/leads"
         class="sidebar-link {% if active_nav == 'leads' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Leads
      </a>
      <a href="/dashboard/calls"
         class="sidebar-link {% if active_nav == 'calls' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
        </svg>
        Calls
      </a>
      <a href="/dashboard/contractors"
         class="sidebar-link {% if active_nav == 'contractors' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
        Contractors
      </a>
      <a href="/dashboard/live"
         class="sidebar-link {% if active_nav == 'live' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728M8.464 15.536a5 5 0 010-7.072m7.072 0a5 5 0 010 7.072M12 12h.01" />
        </svg>
        Live
      </a>
      <a href="/dashboard/billing"
         class="sidebar-link {% if active_nav == 'billing' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
        </svg>
        Billing
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-4 border-t border-gray-800">
      <p class="text-xs text-gray-600">TradeFlow-OS Pro v1.0</p>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top bar -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between flex-shrink-0">
      <h1 class="text-white font-semibold text-lg">{% block page_title %}Dashboard{% endblock %}</h1>
      <span class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded font-mono">Admin</span>
    </header>

    <!-- Flash messages -->
    {% if flash %}
    <div class="mx-6 mt-4">
      <div class="bg-indigo-900 border border-indigo-700 text-indigo-200 rounded-lg px-4 py-3 text-sm">
        {{ flash }}
      </div>
    </div>
    {% endif %}

    <!-- Content -->
    <main class="flex-1 overflow-y-auto bg-gray-950 p-6">
      {% block content %}{% endblock %}
    </main>

  </div>
</body>
</html>
