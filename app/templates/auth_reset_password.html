<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#1e40af">
  <title>TradeFlow — Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <span class="text-3xl font-bold text-blue-700">TradeFlow</span>
      <p class="text-gray-500 mt-1 text-sm">OS Pro</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h1 class="text-xl font-bold text-gray-900 mb-1">Choose a new password</h1>
      <p class="text-sm text-gray-500 mb-6">Enter and confirm your new password below.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/reset-password" class="space-y-4">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div>
          <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
          <input type="password" id="new_password" name="new_password" required autofocus minlength="8"
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="At least 8 characters">
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="Repeat your new password">
        </div>

        <button type="submit"
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 px-4 rounded-lg transition text-sm mt-2">
          Set New Password
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        <a href="/auth/login" class="text-blue-600 font-medium hover:underline">Back to sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
