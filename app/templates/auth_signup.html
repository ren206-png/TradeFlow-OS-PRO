<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e40af">
  <title>TradeFlow — Create Account</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <span class="text-3xl font-bold text-blue-700">TradeFlow</span>
      <p class="text-gray-500 mt-1 text-sm">OS Pro</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h1 class="text-xl font-bold text-gray-900 mb-1">Create Your TradeFlow Account</h1>
      <p class="text-sm text-gray-500 mb-6">Start managing your contractor business in minutes.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/signup" class="space-y-4">
        <div>
          <label for="business_name" class="block text-sm font-medium text-gray-700 mb-1">Business Name</label>
          <input type="text" id="business_name" name="business_name" required
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="Apex Plumbing Ltd.">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="you@example.com">
        </div>

        <div>
          <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
          <input type="tel" id="phone" name="phone" required
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="+1 (403) 555-0100">
        </div>

        <div>
          <label for="trade" class="block text-sm font-medium text-gray-700 mb-1">Trade</label>
          <select id="trade" name="trade" required
                  class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm bg-white">
            <option value="" disabled selected>Select your trade</option>
            <option value="plumbing">Plumbing</option>
            <option value="hvac">HVAC</option>
            <option value="electrical">Electrical</option>
            <option value="general">General Contracting</option>
          </select>
        </div>

        <div>
          <label for="service_area" class="block text-sm font-medium text-gray-700 mb-1">Service Area</label>
          <input type="text" id="service_area" name="service_area" required
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="e.g. Calgary, T2N">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required minlength="8"
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="At least 8 characters">
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="Re-enter your password">
        </div>

        <button type="submit"
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 px-4 rounded-lg transition text-sm mt-2">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-5">
        Already have an account?
        <a href="/auth/login" class="text-blue-600 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
