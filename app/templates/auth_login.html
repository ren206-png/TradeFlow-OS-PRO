<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#1e40af">
  <title>TradeFlow — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <span class="text-3xl font-bold text-blue-700">TradeFlow</span>
      <p class="text-gray-500 mt-1 text-sm">OS Pro</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h1 class="text-xl font-bold text-gray-900 mb-1">Sign in to TradeFlow</h1>
      <p class="text-sm text-gray-500 mb-6">Welcome back. Enter your credentials to continue.</p>

      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/login" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required autofocus
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                 placeholder="Your password">
        </div>

        <button type="submit"
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 px-4 rounded-lg transition text-sm mt-2">
          Sign In
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-4">
        <a href="/auth/forgot-password" class="text-blue-600 hover:underline">Forgot password?</a>
      </p>

      <p class="text-center text-sm text-gray-500 mt-4">
        New contractor?
        <a href="/auth/signup" class="text-blue-600 font-medium hover:underline">Create account</a>
      </p>
    </div>
  </div>
</body>
</html>
